name: Build and Deploy Backend App to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Log in to Docker Hub
      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login \
            --username "${{ secrets.DOCKERHUB_USERNAME }}" \
            --password-stdin

      # Build and Push Docker Image
      - name: Build and Push Docker Image
        run: |
          BRANCH_NAME=${{ github.ref_name }}

          docker build -t django-school-management-system -f Dockerfile .

          docker tag django-school-management-system:latest \
            ${{ secrets.DOCKERHUB_USERNAME }}/django-school-management-system:$BRANCH_NAME

          docker push \
            ${{ secrets.DOCKERHUB_USERNAME }}/django-school-management-system:$BRANCH_NAME

      # Deploy on AWS EC2
      - name: Deploy on AWS EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_PUBLIC_IP_DEV }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login \
              --username "${{ secrets.DOCKERHUB_USERNAME }}" \
              --password-stdin

            cd Django-School-Management-System

            # First deployment
            # docker compose up -d

            # Subsequent deployments
            docker compose up -d --force-recreate
    
